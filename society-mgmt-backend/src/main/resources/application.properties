spring.application.name=society-mgmt

# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/society_mgmt}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiry-ms=900000
jwt.refresh-expiry-ms=604800000

# App config
app.frontend-origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.receipt-prefix=${RECEIPT_PREFIX:RCP}

# Cloudflare R2 object storage (set all 5 env vars before deploying)
# R2_ACCOUNT_ID  — from R2 overview page in Cloudflare dashboard
# R2_ACCESS_KEY  — R2 API token Access Key ID
# R2_SECRET_KEY  — R2 API token Secret Access Key
# R2_BUCKET      — bucket name (e.g. society-mgmt)
# R2_PUBLIC_URL  — public bucket URL (e.g. https://pub-abc123.r2.dev)
app.r2.account-id=${R2_ACCOUNT_ID}
app.r2.access-key=${R2_ACCESS_KEY}
app.r2.secret-key=${R2_SECRET_KEY}
app.r2.bucket=${R2_BUCKET:society-mgmt}
app.r2.public-url=${R2_PUBLIC_URL}

# Multipart upload limits (5 MB per file)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Server
server.port=8080
server.servlet.context-path=/

# Actuator (lock down in prod)
management.endpoints.web.exposure.include=health,info
